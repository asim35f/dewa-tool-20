<!DOCTYPE html>
<html>
<head>
<title>Simple Summary Tool</title>
</head>
<body>

<h2>Upload Excel / Use Data</h2>
<button onclick="showDailySummary()">Daily Summary</button>
<input type="month" id="monthPicker">
<button onclick="filterByMonth()">Monthly</button>

<script>

var allRows = []; // your data will load here

function formatDate(d) {
    if (!d) return "";
    if (d.includes(".")) {
        let p = d.split(".");
        return `${p[2]}-${p[1]}-${p[0]}`;
    }
    if (d.includes(" ")) {
        return new Date(d).toISOString().slice(0,10);
    }
    return d;
}

function showDailySummary() {
    let today = new Date().toISOString().slice(0,10);

    let teamCount = {};

    allRows.forEach(row => {
        let status = (row["STATUS"] || "").toLowerCase();
        let completedDate = formatDate(row["Completed Date"]);

        if (status.includes("complete") && completedDate === today) {
            let team = row["Team"] || "Unknown";
            teamCount[team] = (teamCount[team] || 0) + 1;
        }
    });

    renderTable(teamCount, "Daily Summary");
}

function filterByMonth() {
    let selected = document.getElementById("monthPicker").value;

    if (!selected) {
        alert("Select month");
        return;
    }

    let teamCount = {};

    allRows.forEach(row => {
        let status = (row["STATUS"] || "").toLowerCase();
        let completedDate = formatDate(row["Completed Date"]);

        if (status.includes("complete") && completedDate.startsWith(selected)) {
            let team = row["Team"] || "Unknown";
            teamCount[team] = (teamCount[team] || 0) + 1;
        }
    });

    renderTable(teamCount, "Monthly Summary");
}

function renderTable(data, title) {
    let total = 0;

    let html = `<h2>${title}</h2>
    <table border="1" style="border-collapse:collapse;width:50%">
    <tr><th>Team</th><th>Jobs</th></tr>`;

    for (let t in data) {
        html += `<tr><td>${t}</td><td>${data[t]}</td></tr>`;
        total += data[t];
    }

    html += `<tr><td><b>Total</b></td><td><b>${total}</b></td></tr>`;
    html += "</table>";

    let w = window.open();
    w.document.write(html);
}

</script>

</body>
</html>
